---
name: Integration Tests (Storage)

on:
  push:
    branches: &branches
      - "master"
      - "release/**"
    paths-ignore: &paths-ignore
      - "docs/**"
      - "examples/**"
      - "charts/**"
      - "hack/**"
      - "**/*.md"
      - "**/*.gitignore"
      - "**/*.gitattributes"
      - "Makefile"
      - ".golangci.yml"
  pull_request:
    branches: *branches
    paths-ignore: *paths-ignore
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run tests
        run: |
          make test-integ-storage
