apiVersion: v1
kind: Secret
metadata:
  name: wal-generator-secret
  namespace: pgrwl-test
type: Opaque
stringData:
  PGHOST: "postgres.pgrwl-test.svc"
  PGPORT: "5432"
  PGUSER: "postgres"
  PGPASSWORD: "postgres"
  PGDATABASE: "postgres"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wal-generator-script
  namespace: pgrwl-test
data:
  generate-wal.sh: |
    #!/usr/bin/env sh
    set -eu

    echo "starting WAL generator"
    echo "PGHOST=${PGHOST}"
    echo "PGPORT=${PGPORT}"
    echo "PGUSER=${PGUSER}"
    echo "PGPASSWORD=${PGPASSWORD}"
    echo "PGDATABASE=${PGDATABASE}"
    echo "INTERVAL_SECONDS=${INTERVAL_SECONDS}"

    while true; do
      echo "generating WAL at $(date -Iseconds)"

      psql \
        -v ON_ERROR_STOP=1 \
        -c "DROP TABLE IF EXISTS xxx;" \
        -c "CREATE TABLE IF NOT EXISTS xxx (id serial, payload text);" \
        -c "INSERT INTO xxx(payload) SELECT md5(random()::text) FROM generate_series(1, 10000);" \
        -c "SELECT pg_switch_wal();"

      sleep "${INTERVAL_SECONDS}"
    done

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wal-generator
  namespace: pgrwl-test
  labels:
    app: wal-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wal-generator
  template:
    metadata:
      labels:
        app: wal-generator
    spec:
      containers:
        - name: wal-generator
          image: postgres:17.9-alpine3.23
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /scripts/generate-wal.sh
          env:
            - name: INTERVAL_SECONDS
              value: "5"
          envFrom:
            - secretRef:
                name: wal-generator-secret
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true

      volumes:
        - name: script
          configMap:
            name: wal-generator-script
            defaultMode: 0755
