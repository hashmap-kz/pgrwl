---
apiVersion: v1
kind: Service
metadata:
  name: &app pgrwl-ui
  namespace: pgrwl-test
  labels:
    app: *app
spec:
  type: NodePort
  ports:
    - port: 8585
      targetPort: 8585
      nodePort: 30272
      name: http
  selector:
    app: *app

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgrwl-ui-config
  namespace: pgrwl-test
data:
  pgrwl-ui-config.yml: |
    listen_addr: ":8585"
    receivers:
      - label: localhost
        addr: http://pgrwl-receive:7070

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app pgrwl-ui
  namespace: pgrwl-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *app
  template:
    metadata:
      labels:
        app: *app
    spec:
      volumes:
        - name: pgrwl-ui-config
          configMap:
            name: pgrwl-ui-config
      containers:
        - name: *app
          image: "localhost:5000/pgrwl-ui:latest"
          imagePullPolicy: Always
          env:
            - name: PGRWL_UI_CONFIG_PATH
              value: "/tmp/configs/pgrwl-ui-config.yml"
          ports:
            - containerPort: 8585
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "32m"
            limits:
              memory: "512Mi"
              cpu: "1"
          volumeMounts:
            - mountPath: /tmp/configs
              name: pgrwl-ui-config
