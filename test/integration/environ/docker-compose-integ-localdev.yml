services:
  # ---------------------------------------------------------------------------
  # PostgreSQL primary
  # ---------------------------------------------------------------------------

  pg-primary:
    image: postgres:17.9-bookworm
    container_name: pg-primary
    restart: unless-stopped
    environment:
      TZ: "Asia/Aqtau"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
    command: >
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    configs:
      - source: pg_hba.conf
        target: /etc/postgresql/pg_hba.conf
        mode: "0755"
      - source: postgresql.conf
        target: /etc/postgresql/postgresql.conf
        mode: "0755"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 2s
      timeout: 2s
      retries: 10

  # ---------------------------------------------------------------------------
  # SeaweedFS
  #
  # Runs SeaweedFS in all-in-one mode with S3 support enabled.
  # This is convenient for local testing and behaves like a lightweight
  # S3-compatible object storage service.
  # ---------------------------------------------------------------------------

  seaweedfs:
    image: chrislusf/seaweedfs:4.21
    container_name: seaweedfs
    restart: unless-stopped
    command:
      - server
      - -s3
      - -dir=/data
      - -ip=seaweedfs
      - -ip.bind=0.0.0.0
      - -master.port=9333
      - -volume.port=8080
      - -filer.port=8888
      - -s3.port=8333
      - -s3.config=/etc/seaweedfs/s3.json
    ports:
      - "9333:9333" # master UI/API
      - "8080:8080" # volume UI/API
      - "8888:8888" # filer UI/API
      - "8333:8333" # S3 API
    volumes:
      - seaweedfs-data:/data
    configs:
      - source: seaweedfs-config.json
        target: /etc/seaweedfs/s3.json
        mode: "0444"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8888/" ]
      interval: 3s
      timeout: 2s
      retries: 40

  # ---------------------------------------------------------------------------
  # SeaweedFS admin dashboard
  #
  # Open: http://localhost:23646
  # ---------------------------------------------------------------------------

  seaweedfs-admin:
    image: chrislusf/seaweedfs:4.21
    container_name: seaweedfs-admin
    restart: unless-stopped
    command:
      - admin
      - -port=23646
      - -port.grpc=33646
      - -master=seaweedfs:9333
      - -dataDir=/data
    ports:
      - "23646:23646"
      - "33646:33646"
    volumes:
      - seaweedfs-admin-data:/data
    depends_on:
      seaweedfs:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # SeaweedFS bucket provisioning
  #
  # Creates the S3 bucket used by pgrwl.
  # ---------------------------------------------------------------------------

  seaweedfs-provision:
    image: chrislusf/seaweedfs:4.21
    container_name: seaweedfs-provision
    restart: "no"
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      BUCKETS: "backups"
    entrypoint: [ "/bin/sh" ]
    command:
      - -ec
      - |
        echo "waiting for SeaweedFS shell..."
        until echo "cluster.ps" | weed shell \
          -master=seaweedfs:9333 \
          -filer=seaweedfs:8888 >/dev/null 2>&1; do
          echo "SeaweedFS shell is not ready yet..."
          sleep 2
        done

        for bucket in ${BUCKETS}; do
          echo "creating bucket: ${bucket}"
          echo "s3.bucket.create -name ${bucket}" | weed shell \
            -master=seaweedfs:9333 \
            -filer=seaweedfs:8888 || true
        done

        echo "created buckets:"
        echo "s3.bucket.list" | weed shell \
          -master=seaweedfs:9333 \
          -filer=seaweedfs:8888

volumes:
  pg-primary-data:
  seaweedfs-data:
  seaweedfs-admin-data:

configs:
  pg_hba.conf:
    content: |
      local all         all     trust
      local replication all     trust
      host  all         all all trust
      host  replication all all trust

  postgresql.conf:
    content: |
      # log_error_verbosity:
      # TERSE, DEFAULT, VERBOSE

      # log_min_messages:
      # DEBUG5, DEBUG4, DEBUG3, DEBUG2, DEBUG1,
      # INFO, NOTICE, WARNING, ERROR, LOG, FATAL, PANIC

      listen_addresses         = '*'
      logging_collector        = on
      log_directory            = '/var/log/postgresql'
      log_filename             = 'pg.log'
      log_lock_waits           = on
      log_temp_files           = 0
      log_checkpoints          = on
      log_connections          = off
      log_destination          = 'stderr'
      log_error_verbosity      = 'DEFAULT'
      log_hostname             = off
      log_min_messages         = 'WARNING'
      log_timezone             = 'Asia/Aqtau'
      log_line_prefix          = '%t [%p-%l] %r %q%u@%d '
      wal_level                = replica
      max_wal_senders          = 10
      max_replication_slots    = 10
      wal_keep_size            = 64MB
      log_replication_commands = on
      datestyle                = 'iso, mdy'
      timezone                 = 'Asia/Aqtau'
      shared_preload_libraries = 'pg_stat_statements'

  seaweedfs-config.json:
    content: |
      {
        "identities": [
          {
            "name": "pgrwl",
            "credentials": [
              {
                "accessKey": "pgrwl",
                "secretKey": "pgrwl-secret"
              }
            ],
            "actions": [
              "Admin",
              "Read",
              "Write",
              "List",
              "Tagging"
            ]
          }
        ]
      }
